name: 🧪 UFFS Tier 1 Nightly CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
      - '.github/workflows/optimized-ci.yml'
      - 'rust-toolchain.toml'
      - 'scripts/ci/check_file_size_policy.sh'
      - 'scripts/ci/file_size_exceptions.txt'
      - 'scripts/ci/ci-pipeline.rs'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
      - '.github/workflows/optimized-ci.yml'
      - 'rust-toolchain.toml'
      - 'scripts/ci/check_file_size_policy.sh'
      - 'scripts/ci/file_size_exceptions.txt'
      - 'scripts/ci/ci-pipeline.rs'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: target
  RUSTC_WRAPPER: ""
  CARGO_BUILD_JOBS: 2

jobs:
  format-check:
    name: Tier 1 / Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Tier 1 / Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Run nightly clippy gate
        run: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings

  rustdoc:
    name: Tier 1 / Rustdoc
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Run rustdoc warnings gate
        run: RUSTDOCFLAGS="-Dwarnings" cargo doc --workspace --all-features --no-deps

  tests:
    name: Tier 1 / Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install nextest
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-features --lib --bins --tests --profile ci

      - name: Run doc tests
        run: RUSTDOCFLAGS="-Dwarnings" cargo test --doc --workspace --all-features

  security:
    name: Tier 1 / Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned nightly (from rust-toolchain.toml)
        run: rustup show

      - name: Cache dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@dfc84ffb7254b048a0a843316ff5a2714dcdc7bd # cargo-deny

      - name: Run dependency & license check
        run: cargo deny check

  file-size-policy:
    name: Tier 1 / File Size Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Enforce file size policy
        run: bash scripts/ci/check_file_size_policy.sh
