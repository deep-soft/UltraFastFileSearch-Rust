#
# Dependabot — automated dependency update PRs.
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # Rust / Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "githubrobbi"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor/patch updates to reduce PR noise
    groups:
      polars:
        patterns:
          - "polars*"
      serde:
        patterns:
          - "serde*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "polars*"
          - "serde*"

  # GitHub Actions — pinned to SHA, Dependabot proposes SHA bumps
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "githubrobbi"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
