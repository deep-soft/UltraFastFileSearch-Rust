# MCP-only tests — protocol-level validation that has no CLI/API equivalent.
# Tests that exercise uffs.search, uffs.aggregate, etc. belong in the
# existing TOML files (01-general, 09-aggregation, ...) with "mcp" added
# to their `targets` list.

# ── Session bootstrap ────────────────────────────────────────────────────

[[test]]
id          = "M100"
group       = "mcp-session"
name        = "M100 protocol version"
title       = "Agent session: protocol = 2024-11-05"
short_desc  = "MCP initialize returns protocolVersion 2024-11-05"
targets     = ["mcp"]
mcp_method  = "initialize"
mcp_checks  = { path_equals = { "/protocolVersion" = "2024-11-05" } }

[[test]]
id          = "M101"
group       = "mcp-session"
name        = "M101 server name"
title       = "Agent session: server identifies as uffs"
short_desc  = "MCP initialize returns serverInfo.name = uffs"
targets     = ["mcp"]
mcp_method  = "initialize"
mcp_checks  = { path_equals = { "/serverInfo/name" = "uffs" } }

[[test]]
id          = "M102"
group       = "mcp-session"
name        = "M102 tools capability"
title       = "Agent session: server declares tools capability"
short_desc  = "Initialize result has capabilities.tools"
targets     = ["mcp"]
mcp_method  = "initialize"
mcp_checks  = { path_exists = ["/capabilities/tools"] }

[[test]]
id          = "M103"
group       = "mcp-session"
name        = "M103 resources capability"
title       = "Agent session: server declares resources capability"
short_desc  = "Initialize result has capabilities.resources"
targets     = ["mcp"]
mcp_method  = "initialize"
mcp_checks  = { path_exists = ["/capabilities/resources"] }

[[test]]
id          = "M104"
group       = "mcp-session"
name        = "M104 prompts capability"
title       = "Agent session: server declares prompts capability"
short_desc  = "Initialize result has capabilities.prompts"
targets     = ["mcp"]
mcp_method  = "initialize"
mcp_checks  = { path_exists = ["/capabilities/prompts"] }

# ── Tool discovery ───────────────────────────────────────────────────────

[[test]]
id          = "M110"
group       = "mcp-discovery"
name        = "M110 tools/list"
title       = "Agent discovers tools"
short_desc  = "tools/list returns a non-empty tool array"
targets     = ["mcp"]
mcp_method  = "tools/list"
mcp_checks  = { path_exists = ["/tools"] }

[[test]]
id          = "M111"
group       = "mcp-discovery"
name        = "M111 tool inputSchema"
title       = "Every tool has inputSchema for the agent"
short_desc  = "First tool in tools/list has an inputSchema"
targets     = ["mcp"]
mcp_method  = "tools/list"
mcp_checks  = { path_exists = ["/tools/0/inputSchema"] }

[[test]]
id          = "M112"
group       = "mcp-discovery"
name        = "M112 tool annotations"
title       = "Every tool declares readOnlyHint annotation"
short_desc  = "First tool has annotations object"
targets     = ["mcp"]
mcp_method  = "tools/list"
mcp_checks  = { path_exists = ["/tools/0/annotations"] }

