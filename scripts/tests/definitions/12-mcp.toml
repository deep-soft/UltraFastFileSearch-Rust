# ── Protocol hygiene ─────────────────────────────────────────────────────

[[test]]
id          = "M700"
group       = "mcp-hygiene"
name        = "M700 unknown method"
title       = "Unknown method returns error (not crash)"
short_desc  = "Calling a nonexistent method returns JSON-RPC error"
targets     = ["mcp"]
mcp_method  = "this_method_does_not_exist"
mcp_checks  = { expect_rpc_error = true }
