# RPC response (CLI formatter handles sub-rows internally).

[[test]]
id          = "S3C.2"
group       = "aggregation"
name        = "S3C.2 nested rollup table rendering"
title       = "S3C.2 nested rollup table rendering"
short_desc  = "S3C.2 nested rollup table rendering"
cli_args    = ["*", "--limit", "0", "--agg", "rollup:drive,sub=terms:type,top=3", "--format", "table"]
stdout_contains = ["=== rollup ===", "Count", "Total Size"]
cli_checks.expect_min_rows  = 1
api_checks.expect_agg_results = 1
api_checks.agg_label_contains = ["rollup"]

