]

[[test]]
id          = "H7"
group       = "help"
name        = "H7 uffs --version"
title       = "H7 version output"
short_desc  = "Version flag prints version string"
cli_args    = ["--version"]
targets     = ["cli"]
validator   = "H7"
stdout_contains = ["uffs"]
