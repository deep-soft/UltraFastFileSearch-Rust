targets     = ["cli"]
validator   = "H3"
stdout_contains = [
    "mcp",
    "Commands:",
    "start",
    "status",
    "stop",
    "kill",
    "restart",
    "reload",
]

[[test]]
id          = "H4"
group       = "help"
name        = "H4 uffs stats --help"
title       = "H4 stats subcommand help"
