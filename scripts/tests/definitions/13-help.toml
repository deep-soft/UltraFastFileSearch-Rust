[[test]]
id          = "H6"
group       = "help"
name        = "H6 uffs status --help"
title       = "H6 status subcommand help"
short_desc  = "Status help shows usage"
cli_args    = ["status", "--help"]
targets     = ["cli"]
stdout_contains = [
    "status",
