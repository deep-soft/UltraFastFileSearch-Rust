# help / version tests
# Validates that CLI help output contains expected sections and keywords.
# These tests do NOT require a running daemon or data source.

[[test]]
id          = "H1"
group       = "help"
name        = "H1 uffs --help"
title       = "H1 main help text"
short_desc  = "Top-level help shows commands, arguments, options, examples"
cli_args    = ["--help"]
targets     = ["cli"]
validator   = "H1"
stdout_contains = [
    "Usage:",
    "Commands:",
    "daemon",
    "mcp",
    "stats",
    "aggregate",
    "status",
    "Arguments:",
    "[PATTERN]",
    "Options:",
    "--drive",
    "--mft-file",
    "--data-dir",
    "--limit",
    "--format",
    "--sort",
    "--ext",
    "--columns",
    "--help",
    "--version",
    "Examples:",
]

[[test]]
id          = "H2"
group       = "help"
name        = "H2 uffs daemon --help"
title       = "H2 daemon subcommand help"
short_desc  = "Daemon help shows lifecycle subcommands"
cli_args    = ["daemon", "--help"]
targets     = ["cli"]
validator   = "H2"
stdout_contains = [
    "daemon",
    "Commands:",
    "start",
    "status",
    "stop",
    "kill",
    "restart",
    "load",
]

[[test]]
id          = "H3"
