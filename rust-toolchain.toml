# Rust Toolchain Configuration for UFFS Project
# This file ensures consistent toolchain usage across all environments
# and prevents issues caused by switching between stable/nightly toolchains

[toolchain]
# Latest nightly — updated 2026-04-19.
# CI must NOT override this with `@nightly`; this file is the single source of truth.
#
# History note: previously pinned to nightly-2026-04-11 because nightly-2026-04-13
# broke tokio 1.51.1 via unresolved imports in tokio::io::util.  Tokio 1.52.1 (which
# the workspace now depends on) resolves the interaction, so the original trigger is
# gone.  Current pin is nightly-2026-04-17: the latest nightly that compiles the
# workspace cleanly as of 2026-04-19 — nightly-2026-04-18 regresses with an E0512
# `ethnum` transmute error in a polars transitive dep.  Run `just toolchain-sync` to
# re-attempt a bump; the CI pipeline will auto-refresh on `ship --fresh` unless
# `--skip-toolchain-sync` is passed.
channel = "nightly-2026-04-17"

# Specify components that should always be available
components = [
    "rustc",          # The Rust compiler
    "cargo",          # Package manager and build tool
    "rustfmt",        # Code formatter
    "clippy",         # Linter for catching common mistakes
    "rust-src",       # Source code for standard library (needed for IDE features)
    "rust-analyzer",  # Language server for IDE support
    "llvm-tools",     # LLVM tools for coverage and profiling
    "miri",           # Interpreter for detecting undefined behavior
]

# Specify targets for cross-compilation support
targets = [
    "x86_64-unknown-linux-gnu",    # Linux x64
    "x86_64-pc-windows-msvc",      # Windows x64
    "x86_64-apple-darwin",         # macOS Intel
    "aarch64-apple-darwin",        # macOS Apple Silicon
    "aarch64-unknown-linux-gnu",   # Linux ARM64
]

# Profile for development - optimized for fast compilation and good debugging
profile = "default"
